  # provided in the 'clocks' section. Use the block-generated 250 MHz clock so
  # the data path is rate-matched to the downstream radio.
  clk_domain: ce_250
  inputs:
    # txPayload: 2 QPSK payload bits per clock cycle, packed as bit0/bit1 of a uint8
    txPayload:
      item_width: 8
      nipc: 1
      info_fifo_depth: 32
      payload_fifo_depth: 32
      format: s8
  outputs:
    # txData: modulated I/Q samples
    txData:
      item_width: 32
      nipc: 1
      info_fifo_depth: 32
      sideband_at_end: True
      payload_fifo_depth: 32
      format: sc16

fpga_includes:
