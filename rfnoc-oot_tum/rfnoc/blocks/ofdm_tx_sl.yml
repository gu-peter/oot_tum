# List all clocks required for this RFNoC block. rfnoc_chdr and rfnoc_ctrl
# are always required and available.
#
# 'ce' is the 266.667 MHz compute-engine clock provided by the X440 BSP (it is
# connected to this block via a clk_domain connection in the image core YAML).
# 'ce_250' is a 250 MHz clock *generated inside this block* from 'ce' by a
# Xilinx MMCM (see rfnoc_block_ofdm_tx_sl.sv). It is declared 'direction: out'
# so the rfnoc_image_builder knows the block drives it (no clk_domain
# connection is needed for an output clock) and could route it to other blocks.
# The data path runs in this 250 MHz domain so the block's output sample rate
# matches the downstream radio (250 MHz) instead of the 266.667 MHz ce clock.
clocks:
  - name: rfnoc_chdr
  - name: rfnoc_ctrl
  - name: ce
    direction: in
  - name: ce_250
    direction: out

# A control interface is always required. This is used for the control
# traffic between host software and this RFNoC block on the FPGA.
# The 'enable' input and 'txPayloadReady' output are implemented as
# ctrlport registers (read/write via the block controller), not as
# separate data ports.
control:
  fpga_iface: ctrlport
  interface_direction: slave
  # The FIFO depth determines how many commands may be queued up.
  fifo_depth: 32
  # The clock domain of this control interface must be one of the domains
  # listed in the 'clocks' section.
  clk_domain: rfnoc_chdr
  ctrlport:
    byte_mode: False
    # Set to True if this RFNoC block understands timed commands.
    timed: False
    # Set to True if your block returns a controlport status response.
    has_status: False

data:
  # The FPGA interface defines how the block IP handles data streams.
  fpga_iface: axis_data
